version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: diagnosis-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diagnosis
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: Asia/Shanghai
      # PostgreSQL 性能优化（针对 2GB 内存）
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 256MB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - diagnosis-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: diagnosis-redis
    restart: always
    command: redis-server --appendonly yes --requirepass redis_password --maxmemory 200mb --maxmemory-policy allkeys-lru
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - diagnosis-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: diagnosis-server
    restart: always
    environment:
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: diagnosis

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password

      # 巨量引擎 API 配置（⚠️ 请替换为实际值）
      OCEAN_ENGINE_BASE_URL: https://api.oceanengine.com
      OCEAN_ENGINE_APP_ID: your_app_id
      OCEAN_ENGINE_APP_SECRET: your_app_secret
      OCEAN_ENGINE_WEBHOOK_SECRET: your_webhook_secret
      # OAuth 回调地址（部署后填写实际域名）
      OCEAN_ENGINE_REDIRECT_URI: https://luoruihuan.top/api/auth/ocean-engine/callback
      OCEAN_ENGINE_FRONTEND_CALLBACK: https://luoruihuan.top/oauth/callback

      # JWT 配置（⚠️ 生产环境请修改为随机强密钥）
      JWT_SECRET: change-this-to-a-random-secret-in-production
      JWT_EXPIRES_IN: 8h

      # 服务配置
      PORT: 3000
      NODE_ENV: production
      TZ: Asia/Shanghai

      # Node.js 内存限制（针对 2GB 内存服务器）
      NODE_OPTIONS: --max-old-space-size=512
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diagnosis-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  web:
    build:
      context: ./public
      dockerfile: Dockerfile
    container_name: diagnosis-web
    restart: always
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 证书目录
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot（用于证书验证）
      - certbot_webroot:/var/www/certbot
    depends_on:
      - server
    networks:
      - diagnosis-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  diagnosis-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_webroot:
    driver: local
