version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: dev-diagnosis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diagnosis
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dev-diagnosis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: dev-diagnosis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_password
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    networks:
      - dev-diagnosis-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dev-diagnosis-network:
    driver: bridge

volumes:
  dev_postgres_data:
    driver: local
  dev_redis_data:
    driver: local
